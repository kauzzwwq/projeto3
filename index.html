<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nike.com</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ff00cc,#3333ff);
    transition:0.5s;
}
header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 30px;
    position:sticky;
    top:0;
    background:white;
    z-index:1000;
}
.logo img {
    height:60px;
}
nav ul {
    display:flex;
    gap:15px;
    list-style:none;
    padding:0;
    margin:0;
}
nav a {
    text-decoration:none;
    color:black;
    font-weight:600;
    font-size:18px;
    padding:8px 12px;
    letter-spacing:1px;
    transition:0.3s;
    cursor:pointer;
}
nav a:hover{color:#ff0099;}
.card {
    width:90%;
    max-width:1200px;
    margin:50px auto;
    background:white;
    padding:50px;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
.bg-text {
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:120px;
    font-weight:800;
    color:rgba(255,0,204,0.05);
    white-space:nowrap;
    pointer-events:none;
    z-index:0;
}
.img-box {
    flex:1 1 400px;
    display:flex;
    justify-content:center;
    z-index:1;
}
.img-box img {
    width:400px;
    max-width:100%;
    transform:rotate(-20deg);
    transition:0.4s;
}
.info {
    flex:1 1 400px;
    z-index:1;
    margin-left:20px;
}
.info span {font-size:12px;color:#888;}
.info h1 {font-size:36px;margin:5px 0 10px;}
.info h2 {font-size:20px;margin:0 0 20px;}
.info p {font-size:14px;color:#555;line-height:1.6;}
.thumbs {display:flex;gap:10px;margin-top:20px;}
.thumbs img {
    width:80px;
    cursor:pointer;
    transition:0.3s;
    opacity:0.6;
    border-bottom:3px solid transparent;
}
.thumbs img:hover{transform:scale(1.1);opacity:1;}
.thumbs img.active{opacity:1;border-bottom:3px solid;}
.sizes {margin-top:20px;}
.sizes span {display:block;font-size:14px;font-weight:600;margin-bottom:8px;}
.size-options {display:flex;gap:8px;flex-wrap:wrap;}
.size-options button {
    width:45px;height:45px;border:1px solid #e5e5e5;background:#f7f7f7;border-radius:8px;cursor:pointer;transition:0.25s;font-weight:600;
}
.size-options button.active {background:black;color:white;transform:scale(1.05);}
.buy-btn {
    margin-top:25px;width:200px;height:50px;
    background:linear-gradient(135deg,#ff0099,#ff4d4d);
    color:white;
    border:none;
    border-radius:25px;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    transition:0.3s;
}
.buy-btn:hover{transform:scale(1.05);}

/* RESPONSIVO */
@media(max-width:768px){
    .card {flex-direction:column;align-items:center;padding:30px;margin:20px;}
    .img-box img{width:250px;}
    .info h1{font-size:26px;}
    .info h2{font-size:18px;}
    .info p{font-size:13px;}
    .bg-text{font-size:50px;top:10px;transform:translateX(-50%);}
    nav ul{flex-wrap:wrap;justify-content:center;gap:10px;}
    nav a{font-size:14px;padding:6px 8px;}
    header{padding:15px 20px;}
}
</style>
</head>
<body>

<header>
<div class="logo"><img src="https://raw.githubusercontent.com/kauzzwwq/projeto3/main/logo.png"></div>
<nav>
<ul>
<li><a id="menu-men">MEN</a></li>
<li><a id="menu-women">WOMEN</a></li>
<li><a id="menu-kids">KIDS</a></li>
<li><a id="menu-contato">CONTATO</a></li>
</ul>
</nav>
</header>

<div class="card" id="card">
<div class="bg-text" id="bgText">VAPORFLY PINK</div>
<div class="img-box">
<img id="main-shoe" src="https://raw.githubusercontent.com/kauzzwwq/projeto3/main/tenis1.png">
</div>
<div class="info" id="info-card">
<span>Women's Shoes</span>
<h1>NIKE<br>VAPORFLY 3</h1>
<h2>$160</h2>
<p>O Nike Vaporfly 3 foi desenvolvido para quem busca velocidade e desempenho máximo.</p>
<div class="thumbs" id="thumbs-container">
<img src="https://raw.githubusercontent.com/kauzzwwq/projeto3/main/tenis1.png" class="active" data-color="pink">
<img src="https://raw.githubusercontent.com/kauzzwwq/projeto3/main/tenisva.png.png" data-color="green">
<img src="https://raw.githubusercontent.com/kauzzwwq/projeto3/main/tenisr.png.png" data-color="red">
</div>
<div class="sizes" id="sizes-div">
<span>Selecione o Tamanho</span>
<div class="size-options" id="size-options">
<button>35</button><button>36</button><button>37</button><button>38</button>
</div>
</div>
<button class="buy-btn" id="buy-btn">BUY NOW</button>
</div>
</div>

<script>
const mainShoe=document.getElementById('main-shoe');
const bgText=document.getElementById('bgText');
const buyBtn=document.getElementById('buy-btn');
const sizeOptions=document.getElementById('size-options');
const sizesDiv=document.getElementById('sizes-div');
const thumbsContainer=document.getElementById('thumbs-container');

function isMobile() { return window.innerWidth <= 768; }

// Selecao de tamanho
function setupSizes() {
    const buttons=sizesDiv.querySelectorAll('button');
    buttons.forEach(btn=>{
        btn.addEventListener('click',()=>{
            buttons.forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
}
setupSizes();

// Trocar tênis
function changeShoe(color){
    const thumbs=thumbsContainer.querySelectorAll('img');
    thumbs.forEach(t=>{t.classList.remove('active');t.style.borderBottomColor="transparent";});
    if(color==='green'){
        mainShoe.src="https://raw.githubusercontent.com/kauzzwwq/projeto3/main/tenisva.png.png";
        bgText.innerText="VAPORFLY GREEN";bgText.style.color="rgba(0,200,83,0.05)";
        document.body.style.background="linear-gradient(135deg,#00c853,#003d1f)";
        buyBtn.style.background="linear-gradient(135deg,#00e676,#00c853)";
        thumbs[1].classList.add("active");thumbs[1].style.borderBottomColor="#00e676";
    } else if(color==='pink'){
        mainShoe.src="https://raw.githubusercontent.com/kauzzwwq/projeto3/main/tenis1.png";
        bgText.innerText="VAPORFLY PINK";bgText.style.color="rgba(255,0,204,0.1)";
        document.body.style.background="linear-gradient(135deg,#ff00cc,#3333ff)";
        buyBtn.style.background="linear-gradient(135deg,#ff0099,#ff4d4d)";
        thumbs[0].classList.add("active");thumbs[0].style.borderBottomColor="#ff0099";
    } else if(color==='red'){
        mainShoe.src="https://raw.githubusercontent.com/kauzzwwq/projeto3/main/tenisr.png.png";
        bgText.innerText="AIR MAX 90";bgText.style.color="rgba(255,23,68,0.1)";
        document.body.style.background="linear-gradient(135deg,#ff1744,#5a0000)";
        buyBtn.style.background="linear-gradient(135deg,#ff5252,#ff1744)";
        thumbs[2].classList.add("active");thumbs[2].style.borderBottomColor="#ff1744";
    }
}

// Delegação de evento para thumbs
thumbsContainer.addEventListener('click', e=>{
    if(e.target.tagName==='IMG' && e.target.dataset.color) changeShoe(e.target.dataset.color);
});

// Menu - altera somente tamanhos no mobile
document.getElementById('menu-men').addEventListener('click',()=>{
    if(isMobile()) sizeOptions.innerHTML='<button>38</button><button>39</button><button>40</button><button>41</button><button>42</button>';
    setupSizes();
});
document.getElementById('menu-women').addEventListener('click',()=>{
    if(isMobile()) sizeOptions.innerHTML='<button>35</button><button>36</button><button>37</button><button>38</button>';
    setupSizes();
});
document.getElementById('menu-kids').addEventListener('click',()=>{
    if(isMobile()) sizeOptions.innerHTML='<button>30</button><button>31</button><button>32</button><button>33</button>';
    setupSizes();
});

// Contato
document.getElementById('menu-contato').addEventListener('click',()=>{
    const infoCard=document.getElementById('info-card');
    infoCard.innerHTML=`<h1 style="font-size:40px;color:#555;margin-bottom:20px;">CONTATO</h1>
    <p>GitHub: <a href="https://github.com/kauzzwwq" target="_blank">kauzzwwq</a></p>
    <p>WhatsApp: <a href="https://wa.me/5549999695059" target="_blank">+55 49 99969-5059</a></p>
    <button id="back-btn" style="margin-top:20px;padding:10px 20px;border:none;border-radius:10px;background:black;color:white;cursor:pointer;">Voltar para os tênis</button>`;
    mainShoe.style.display='none';
    bgText.innerText='';
    buyBtn.style.display='none';
    sizesDiv.style.display='none';

    document.getElementById('back-btn').addEventListener('click',()=>{
        location.reload();
    });
});
</script>

</body>
</html>

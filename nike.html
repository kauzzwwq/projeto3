<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike.com</title>

    <!-- Fonte estilo Nike -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 10px 0;
        }

        /* LOGO */
        .logo {
            position: absolute;
            top: 20px; /* ajusta a posição vertical da logo */
            left: 0;

        }

        .logo img {
            height: 100px;
        }

header {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 25px 0; /* aumenta altura do topo */
}

/* NAV */
nav {
    margin-top: 30px; /* desce mais */
}

nav ul {
    display: flex;
    gap: 25px; /* aumenta um pouco o espaço entre itens */
    list-style: none;
    padding: 0;
    margin: 0;
}

nav a {
    text-decoration: none;
    color: black;
    font-weight: 600;
    font-size: 22px; /* 🔥 maior */
    padding: 10px 15px; /* 🔥 aumenta área do botão */
    letter-spacing: 1px;
    transition: 0.3s;
}
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <img src="img/logo.png" alt="Nike Logo">
        </div>

        <nav>
            <ul>
                <li><a href="#men">MEN</a></li>
                <li><a href="#women">WOMEN</a></li>
                <li><a href="#kids">KIDS</a></li>
                <li><a href="#accessories">ACCESSORIES</a></li>
                <li><a href="#sales">SALES</a></li>
            </ul>
        </nav>
    </header>

</body>
</html>
